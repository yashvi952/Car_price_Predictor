<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Price Predictor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.css">

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
</head>

<body class="bg-dark">

<div class="container">
    <div class="row">
        <div class="card mt-50" style="width: 100%; height: 100%">

            <div class="card-header" style="text-align: center">
                <h1>Welcome to Car Price Predictor</h1>
            </div>

            <div class="card-body">

                <div class="col-12" style="text-align: center">
                    <h5>This app predicts the price of a car you want to sell.</h5>
                </div>

                <br>

                <form method="post" id="Modelform" name="Modelform">

                    <div class="col-md-10 form-group" style="text-align: center">
                        <label for="company"><b>Select the company:</b></label>
                        <select class="form-control" id="company" name="company" required
                                onchange="load_car_models(this.value)">
                            <option value="">Select Company</option>
                            {% for company in companies %}
                            <option value="{{ company }}">{{ company }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-10 form-group" style="text-align: center">
                        <label for="car_models"><b>Select the model:</b></label>
                        <select class="form-control" id="car_models" name="car_models" required>
                            <option value="">Select Model</option>
                        </select>
                    </div>

                    <div class="col-md-10 form-group" style="text-align: center">
                        <label for="year"><b>Select Year of Purchase:</b></label>
                        <select class="form-control" id="year" name="year" required>
                            <option value="">Select Year</option>
                            {% for year in years %}
                            <option value="{{ year }}">{{ year }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-10 form-group" style="text-align: center">
                        <label for="fuel_type"><b>Select the Fuel Type:</b></label>
                        <select class="form-control" id="fuel_type" name="fuel_type" required>
                            <option value="">Select Fuel Type</option>
                            {% for fuel in fuel_types %}
                            <option value="{{ fuel }}">{{ fuel }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-10 form-group" style="text-align: center">
                        <label for="kilo_driven">
                            <b>Enter the Number of Kilometres Driven:</b>
                        </label>
                        <input type="number"
                               class="form-control"
                               id="kilo_driven"
                               name="kilo_driven"
                               placeholder="Enter kilometres driven"
                               required>
                    </div>

                    <div class="col-md-10 form-group" style="text-align: center">
                        <button type="submit" class="btn btn-primary form-control">
                            Predict Price
                        </button>
                    </div>

                </form>

                <br>

                <div class="row">
                    <div class="col-12" style="text-align: center">
                        <h4>
                            <span id="prediction"></span>
                        </h4>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    const carModels = {{ car_models | tojson }};

    function load_car_models(selectedCompany) {
        const carModelSelect = document.getElementById("car_models");

        carModelSelect.innerHTML = "<option value=''>Select Model</option>";

        carModels.forEach(function(model) {
            if (model.includes(selectedCompany)) {
                const option = document.createElement("option");
                option.value = model;
                option.innerHTML = model;
                carModelSelect.appendChild(option);
            }
        });
    }

    document.getElementById("Modelform").addEventListener("submit", function(event) {
        event.preventDefault();

        const formData = new FormData(this);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/predict", true);

        document.getElementById("prediction").innerHTML =
            "Wait! Predicting Price...";

        xhr.onreadystatechange = function() {
            if (xhr.readyState === XMLHttpRequest.DONE) {
                document.getElementById("prediction").innerHTML =
                    "Prediction: ₹" + xhr.responseText;
            }
        };

        xhr.send(formData);
    });
</script>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>

</body>
</html>
